name: Build Resume

on: [push]

jobs:
  build:
    runs-on: docker

    steps:
      - name: Checkout
        run: git clone ${{ github.server_url }}/${{ github.repository }}.git .

      - name: Build
        run: docker run --rm -w /doc -v $PWD:/doc thomasweise/docker-texlive-full make

      - name: Upload PDF
        uses: actions/upload-artifact@v3
        with:
          name: resume
          path: examples/resume_jm_tremblay*.pdf
